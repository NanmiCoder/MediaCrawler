services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "18080:8000"
    env_file:
      - .env
    volumes:
      - ./workspaces:/app/workspaces
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

volumes:
  redis_data:
