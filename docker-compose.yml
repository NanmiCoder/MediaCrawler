services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "18080:8000"
    env_file:
      - .env
    environment:
      DY_API_HOST: "0.0.0.0"
      DY_API_AUTH_REQUIRED: "1"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      REDIS_DB: "${REDIS_DB:-0}"
    volumes:
      - ./workspaces:/app/workspaces
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
    volumes:
      - redis_data:/data
    # Internal-only, passwordless development default. Do not publish port 6379.
    # Secured deployments must set the same injected password on both services.
    command:
      - sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
        fi
        exec redis-server --appendonly yes
    restart: unless-stopped

volumes:
  redis_data:
