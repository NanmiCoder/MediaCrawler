services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: mediacrawler-backend
    ports:
      - "8080:8080"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./:/app
    networks:
      - mediacrawler-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: mediacrawler-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - mediacrawler-network
    environment:
      - REACT_APP_API_URL=http://backend:8080
    restart: unless-stopped

networks:
  mediacrawler-network:
    driver: bridge
